site_name: Debug Handbook
site_description: 実務で使えるデバッグ力を身につけるためのハンズオン教材
site_author: Osk0830

docs_dir: .

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - pymdownx.details
  - pymdownx.superfences

exclude_docs: |
  .git/
  .github/
  site/
  _base/
  MKDOCS_NAV_*.md

nav:
  - Home: README.md
  - Project:
      - PROJECT: PROJECT.md
      - Book Architecture: BOOK_ARCHITECTURE.md
      - Style Guide: STYLE_GUIDE.md
      - Contributing: CONTRIBUTING.md
      - Roadmap: ROADMAP.md
      - Changelog: CHANGELOG.md

  - Module01 CLI:
      - Overview: docs/module01-cli/README.md
      - Lessons:
          - CLIとは: docs/module01-cli/lessons/lesson01-what-is-cli.md
          - TerminalとShell: docs/module01-cli/lessons/lesson02-terminal-shell.md
          - pwd: docs/module01-cli/lessons/lesson03-pwd.md
          - ls: docs/module01-cli/lessons/lesson04-ls.md
          - cd: docs/module01-cli/lessons/lesson05-cd.md
          - 相対パスと絶対パス: docs/module01-cli/lessons/lesson06-path.md
          - 環境変数とPATH: docs/module01-cli/lessons/lesson07-env-path.md
          - 標準入出力: docs/module01-cli/lessons/lesson08-stdin-stdout-stderr.md
          - リダイレクト: docs/module01-cli/lessons/lesson09-redirection.md
          - パイプ: docs/module01-cli/lessons/lesson10-pipe.md
